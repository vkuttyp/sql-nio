version: 1
swift_versions:
  - 5.10
  - 6.0
platforms:
  - macos-spm
  - ios
  - tvos
  - watchos
  - linux
  - visionos
  - android
builder:
  configs:
    - platform: linux
      swift_version: '6.0'
      linux_packages:
        - libsqlite3-dev
        - pkg-config
    - platform: android
      swift_versions:
        - 6.0
    - platform: macos-spm
      documentation_targets:
        - CosmoSQLCore
        - CosmoMSSQL
        - CosmoPostgres
        - CosmoMySQL
        - CosmoSQLite
